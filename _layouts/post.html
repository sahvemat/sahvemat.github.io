layout: default
---
<article class="post-article">

  <h1 class="post-title" data-title="{{ page.title }}"></h1>
  <div class="post-meta">
    <span>Yazar: <strong>{{ page.author }}</strong></span>

</header>

{{ content }}

<section class="post-archive"></section>

</article>
