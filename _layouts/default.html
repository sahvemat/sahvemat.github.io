<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title | default: "Şah ve Mat | 3 Aylık Satranç Dergisi" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Outfit", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"],
              serif: ["Playfair Display", "serif"],
            },
            colors: {
              ink: '#1A1A1A',
              paper: '#FDFCF8',
              accent: '#DC2626',
              line: '#000000',
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-paper text-ink font-serif antialiased;
        }
        h1, h2, h3, h4 {
          @apply font-display tracking-tighter uppercase font-black text-balance;
        }
      }

      header.main-nav {
        @apply transition-all duration-500 ease-in-out;
      }
      header.main-nav .logo {
        @apply transition-all duration-500 ease-in-out;
      }
      header.main-nav.scrolled {
        @apply h-24;
      }
      header.main-nav:not(.scrolled) {
        @apply h-48 md:h-64 border-b-4;
      }
      header.main-nav.scrolled .logo {
        @apply text-4xl;
      }
      header.main-nav:not(.scrolled) .logo {
        @apply text-7xl md:text-8xl;
      }
      header.main-nav.scrolled .tagline {
        @apply text-[8px] mt-0 opacity-0 h-0 overflow-hidden;
      }
      header.main-nav:not(.scrolled) .tagline {
        @apply text-[10px] md:text-xs -mt-2 opacity-100 h-auto;
      }

      @layer utilities {
        .border-editorial {
          @apply border-2 border-line;
        }
        .shadow-editorial {
          box-shadow: 10px 10px 0px 0px #1A1A1A;
        }
        .text-vertical {
          writing-mode: vertical-rl;
          text-orientation: mixed;
        }
      }

      fen, puzzle, pgn, pgn-player {
        display: block;
        margin: 2rem 0;
        max-width: 100%;
      }
      .magazine-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
      }
      .article-card {
        @apply border-t border-line pt-6 flex flex-col gap-4;
      }
    </style>
    <script src="https://chesspublica.github.io/elements.js"></script>
    <script src="https://unpkg.com/motion@10.16.4/dist/motion.js"></script>
  </head>
  <body class="min-h-screen selection:bg-accent selection:text-paper bg-neutral-100">
    <div class="max-w-7xl mx-auto border-line bg-paper">
      {% include navigation.html %}
      
      <main>
        {{ content }}
      </main>

      {% include footer.html %}
    </div>

    <script shadow>
      // Simple script to handle some motion-like transitions if needed
      // but mostly we rely on the static CSS for this Jekyll version
    </script>
  </body>
</html>
