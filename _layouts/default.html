<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>♔</text></svg>" type="image/svg+xml">
    <title>{{ page.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChessPublica/ChessPublica.github.io@v0.1.0/dist/ChessPublica.all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/piece-puzzle.css' | relative_url }}">
    <script>
        (function () {
            // Some ad-block / anti-fingerprinting browser extensions
            // neuter requestAnimationFrame outright: it's still callable
            // and returns normally, but the callback is silently never
            // invoked. ChessPublica (loaded below) builds every pgn-player
            // board's engine inside exactly one such callback, so on an
            // affected browser no board on the whole site would ever
            // become interactive, with no error anywhere. This has to run
            // before that script tag — not from our own deferred main.js,
            // which runs too late to matter if something re-patches
            // requestAnimationFrame again in between — and has to be
            // locked non-configurable so nothing later can silently
            // replace it back to a broken version.
            if (typeof window.requestAnimationFrame !== 'function') return;
            var nativeRAF = window.requestAnimationFrame.bind(window);
            window.__rafPatchCalls = 0;
            function patchedRAF(callback) {
                window.__rafPatchCalls++;
                var fired = false;
                var fire = function (ts) {
                    if (fired) return;
                    fired = true;
                    callback(typeof ts === 'number' ? ts : performance.now());
                };
                try { nativeRAF(fire); } catch (e) {}
                setTimeout(fire, 32);
                return 0;
            }
            try {
                Object.defineProperty(window, 'requestAnimationFrame', {
                    value: patchedRAF, writable: false, configurable: false
                });
            } catch (e) {
                window.requestAnimationFrame = patchedRAF;
            }
        })();
        (function () {
            var stored = localStorage.getItem('sah-theme');
            var theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>

</head>
<body>
    <div class="paper-texture"></div>
    <div class="site-container">
        {% include topbar.html %}
        {% include header.html %}
        <main>
            {{ content }}
        </main>
        {% include footer.html %}
    </div>
    <script src="https://cdn.jsdelivr.net/gh/ChessPublica/ChessPublica.github.io@v0.1.0/dist/ChessPublica.all.min.js"></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/piece-puzzle.js' | relative_url }}" defer></script>
</body>
</html>
